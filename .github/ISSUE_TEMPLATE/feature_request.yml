name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for KVault? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
      placeholder: "When working across multiple namespaces, I wish I could…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about? (e.g. workarounds in the Cloudflare dashboard or Wrangler.)

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of KVault does this relate to?
      options:
        - Accounts & namespaces
        - Key list / filtering
        - Global search
        - Monaco editor / value editing
        - Hex viewer / binary values
        - Bulk operations (import/export/delete)
        - Workspaces
        - Command palette / keyboard shortcuts
        - TTL / expiration
        - Themes
        - Sync / caching
        - Packaging / installation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, screenshots, or examples that help illustrate the idea.
